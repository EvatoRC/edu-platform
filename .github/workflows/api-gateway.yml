name: CI/CD - api-gateway

on:
  push:
    branches: [main]
    paths:
      - 'api-gateway/**'
      - '.github/workflows/api-gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api-gateway/**'

jobs:
  test:
    name: Test api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: api-gateway
        run: mvn test -B

  build-and-push:
    name: Build & Push api-gateway
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        working-directory: api-gateway
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ github.sha }}

  deploy:
    name: Deploy api-gateway to EC2
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
            docker stop api-gateway || true
            docker rm   api-gateway || true
            docker run -d --name api-gateway --restart unless-stopped \
              -p 8080:8080 \
              --network host \
              -e SERVICES_COURSE-SERVICE_URL="http://localhost:8081" \
              -e SERVICES_STUDENT-SERVICE_URL="http://localhost:8082" \
              -e SERVICES_ENROLLMENT-SERVICE_URL="http://localhost:8083" \
              ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
            echo "api-gateway deployed"
          EOF
