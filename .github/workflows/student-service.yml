name: CI/CD - student-service

on:
  push:
    branches: [main]
    paths:
      - 'student-service/**'
      - '.github/workflows/student-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'student-service/**'

jobs:
  test:
    name: Test student-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: student-service
        run: mvn test -B
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: student-test-results
          path: student-service/target/surefire-reports/

  build-and-push:
    name: Build & Push student-service
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        working-directory: student-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/student-service:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/student-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/student-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/student-service:${{ github.sha }}

  deploy:
    name: Deploy student-service to EC2
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/student-service:latest
            docker stop student-service || true
            docker rm   student-service || true
            docker run -d --name student-service --restart unless-stopped \
              -p 8082:8082 \
              -v /home/ec2-user/wallet:/app/wallet \
              -e SPRING_DATASOURCE_URL="jdbc:oracle:thin:@${{ secrets.ORACLE_TNS_ALIAS }}?TNS_ADMIN=/app/wallet" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.ORACLE_DB_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/student-service:latest
            echo "student-service deployed"
          EOF
