name: CI/CD - enrollment-service

on:
  push:
    branches: [main]
    paths:
      - 'enrollment-service/**'
      - '.github/workflows/enrollment-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'enrollment-service/**'

jobs:
  test:
    name: Test enrollment-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: enrollment-service
        run: mvn test -B
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrollment-test-results
          path: enrollment-service/target/surefire-reports/

  build-and-push:
    name: Build & Push enrollment-service
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        working-directory: enrollment-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:${{ github.sha }}

  deploy:
    name: Deploy enrollment-service to EC2
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest
            docker stop enrollment-service || true
            docker rm   enrollment-service || true
            docker run -d --name enrollment-service --restart unless-stopped \
              -p 8083:8083 \
              -v /home/ec2-user/wallet:/app/wallet \
              -e SPRING_DATASOURCE_URL="jdbc:oracle:thin:@${{ secrets.ORACLE_TNS_ALIAS }}?TNS_ADMIN=/app/wallet" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.ORACLE_DB_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              -e SERVICES_COURSE-SERVICE_URL="http://localhost:8081" \
              -e SERVICES_STUDENT-SERVICE_URL="http://localhost:8082" \
              --network host \
              ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest
            echo "enrollment-service deployed"
          EOF
